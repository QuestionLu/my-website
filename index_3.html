<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pink Hello World - Enhanced Interactions</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* 極致黑背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Arial Black', sans-serif;
            cursor: crosshair; /* 科技感的十字游標 */
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 150px; /* 給予發光充足的緩衝空間 */
            pointer-events: none; /* 確保滑鼠事件可以穿透文字觸發背景 */
        }

        .main-title {
            color: #ffffff;
            font-size: 10vw; /* 配合單行顯示調整大小 */
            font-weight: 800; /* 比之前稍微細一點點 */
            margin: 0;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.05em; 
            white-space: nowrap; /* 關鍵：強制不換行 */
            
            /* 霓虹桃粉色發光 */
            text-shadow: 
                0 0 10px rgba(255, 0, 160, 1),
                0 0 30px rgba(255, 0, 160, 0.8),
                0 0 60px rgba(255, 0, 160, 0.5),
                0 0 120px rgba(255, 0, 160, 0.3);
            
            animation: pinkPulse 3s infinite alternate ease-in-out;
        }

        .subtitle {
            margin-top: 20px;
            color: #ff00a0;
            font-size: 1.5vw;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(255, 0, 160, 0.6);
            font-weight: 400;
        }

        @keyframes pinkPulse {
            from {
                text-shadow: 
                    0 0 15px #ff00a0, 
                    0 0 30px #ff00a0, 
                    0 0 60px #ff00a0;
                transform: scale(1);
            }
            to {
                text-shadow: 
                    0 0 30px #ff00a0, 
                    0 0 80px #ff00a0, 
                    0 0 150px #ff00a0;
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="content-wrapper">
        <h1 class="main-title">HELLO WORLD</h1>
        <div class="subtitle">Question is my world</div>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 300; // 增加粒子數量
        let isLeftClicking = false;
        let isRightClicking = false;

        let mouse = { x: null, y: null, radius: 150 };

        // 滑鼠事件監聽器
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 點擊事件
        window.addEventListener('mousedown', (e) => {
            // 阻止右鍵菜單，實作自定義散開
            if (e.button === 2) {
                e.preventDefault();
                isRightClicking = true;
            } else if (e.button === 0) {
                isLeftClicking = true;
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                isLeftClicking = false;
            } else if (e.button === 2) {
                isRightClicking = false;
            }
        });

        // 雙重阻止右鍵菜單，確保自定義散開效果
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        window.addEventListener('resize', init);

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                let startX = Math.random() * canvas.width;
                let startY = Math.random() * canvas.height;
                particles.push({
                    x: startX,
                    y: startY,
                    baseX: startX,      // 紀錄初始位置，用於自動回散
                    baseY: startY,
                    size: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 0.8, // 游移速度X
                    vy: (Math.random() - 0.5) * 0.8, // 游移速度Y
                    color: `rgba(255, 0, 160, ${Math.random() * 0.6 + 0.2})`
                });
            }
        }

        function animate() {
            // 背景殘影效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];

                // 物理模擬
                // 1. 速度阻尼 (Friction/Damping)
                p.vx *= 0.96; // 稍微增加阻尼，讓運動更穩定
                p.vy *= 0.96;

                // 2. 加入自動回散機制與隨機游移
                // 讓粒子有回到原位的趨勢，避免永久聚集成一團
                let dxBase = p.baseX - p.x;
                let dyBase = p.baseY - p.y;
                let springForce = 0.001; // 輕微的彈簧拉力
                p.vx += dxBase * springForce;
                p.vy += dyBase * springForce;
                
                // 隨機擾動，讓粒子看起來像在呼吸，保持生命力
                p.vx += (Math.random() - 0.5) * 0.3;
                p.vy += (Math.random() - 0.5) * 0.3;

                // 3. 更新位置 (正常游移)
                p.x += p.vx;
                p.y += p.vy;

                // 4. 邊界檢查 (彈性反彈與位置修正)
                if (p.x < 0) { p.x = 0; p.vx *= -1; }
                if (p.x > canvas.width) { p.x = canvas.width; p.vx *= -1; }
                if (p.y < 0) { p.y = 0; p.vy *= -1; }
                if (p.y > canvas.height) { p.y = canvas.height; p.vy *= -1; }

                // 滑鼠互動 (連線 + 點擊互動)
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - p.x;
                    let dy = mouse.y - p.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // 1. 畫出連線 (使用桃粉色)
                    if (distance < mouse.radius) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 160, ${1 - distance / mouse.radius})`; // 桃粉色
                        ctx.lineWidth = 1;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }

                    // 2. 應用物理力：連線 + 散開/靠攏 (轉化為速度更新)
                    let interactionRange = 300; // 點擊互動範圍
                    let forceFactor = Math.max(0, (interactionRange - distance) / interactionRange); // 力度隨距離衰減

                    if (isLeftClicking && distance < interactionRange) {
                        // 左鍵靠攏: 力從粒子指向滑鼠 (dx, dy)
                        let pullForce = 1.0; // 增強吸力，以克服回散力
                        p.vx += (dx / distance) * forceFactor * pullForce;
                        p.vy += (dy / distance) * forceFactor * pullForce;
                    } else if (isRightClicking && distance < interactionRange) {
                        // 右鍵散開: 力從滑鼠指向粒子 (-dx, -dy)
                        let pushForce = 3.0; // 增強排斥力
                        p.vx -= (dx / distance) * forceFactor * pushForce;
                        p.vy -= (dy / distance) * forceFactor * pushForce;
                    } else if (distance < mouse.radius) {
                        // 無點擊，應用原有柔和排斥力 (改為速度更新)
                        let repulsionForce = (mouse.radius - distance) / mouse.radius;
                        let repulsionFactor = 0.3; // 稍微增強一般排斥力
                        p.vx -= (dx / distance) * repulsionForce * repulsionFactor;
                        p.vy -= (dy / distance) * repulsionForce * repulsionFactor;
                    }
                }

                // 限制粒子速度上限，防止失控 (移至外部確保隨時生效)
                let maxVel = 12; // 放寬速度上限，讓散開更明顯
                p.vx = Math.max(-maxVel, Math.min(maxVel, p.vx));
                p.vy = Math.max(-maxVel, Math.min(maxVel, p.vy));

                // 繪製粒子 (使用桃粉色半透明)
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color; // 桃粉色半透明
                ctx.fill();

                // 粒子彼此間的神經網路連線 (使用桃粉色半透明)
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx2 = p.x - p2.x;
                    let dy2 = p.y - p2.y;
                    let dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

                    if (dist2 < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 160, ${0.2 - dist2 / 500})`; // 桃粉色半透明
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
